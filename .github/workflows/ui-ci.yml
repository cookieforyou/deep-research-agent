name: UI CI

on:
  push:
    branches: [main]
    paths: ['ui/**']
  pull_request:
    paths: ['ui/**']

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'ui/pnpm-lock.yaml'
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'ui/pnpm-lock.yaml'
      - run: pnpm install
      - run: pnpm test -- --coverage

  e2e:
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'ui/pnpm-lock.yaml'
      - run: pnpm install
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm start & sleep 5 && pnpm exec playwright test

  build:
    runs-on: ubuntu-latest
    needs: [e2e]
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'ui/pnpm-lock.yaml'
      - run: pnpm install
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: ui-build
          path: ui/.next/standalone
