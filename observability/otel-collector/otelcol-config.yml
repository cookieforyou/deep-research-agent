# =============================================================================
# OpenTelemetry Collector 配置 — DeepResearch 可观测性
# 接收 OTLP (HTTP/gRPC) → Metrics → Prometheus | Traces → Jaeger
# =============================================================================

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  # 资源属性注入
  attributes:
    actions:
      - key: deployment.environment
        action: upsert
        value: dev

exporters:
  # Metrics → Prometheus (由 Prometheus 通过 /metrics 端点抓取)
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: deepresearch

  # Traces → Jaeger (OTLP 协议)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # 调试输出（仅开发环境，生产请移除）
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
