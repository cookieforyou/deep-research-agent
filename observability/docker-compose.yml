# =============================================================================
# Docker Compose — 完整可观测性栈
# OTel Collector + Jaeger + Prometheus + Grafana
# 用法: docker compose up -d
# =============================================================================

services:
  # ---------- OpenTelemetry Collector: 接收 OTLP 数据并路由 ----------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: deepresearch-otel-collector
    command: ["--config=/etc/otelcol-config.yml"]
    volumes:
      - ./otel-collector/otelcol-config.yml:/etc/otelcol-config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics exporter
    depends_on:
      - jaeger
    restart: unless-stopped

  # ---------- Jaeger: 分布式追踪 UI ----------
  jaeger:
    image: jaegertracing/all-in-one:1.67.0
    container_name: deepresearch-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC (直接接收)
      - "4318:4318"    # OTLP HTTP (直接接收)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  # ---------- Prometheus: 指标采集 + 告警规则评估 ----------
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: deepresearch-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ---------- Grafana: 仪表盘可视化 ----------
  grafana:
    image: grafana/grafana:11.6.0
    container_name: deepresearch-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/llm-overview.json
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
