# =============================================================================
# Prometheus 抓取配置 — DeepResearch Multi-Agent 行业深度研究助手
# 从 Spring Boot Actuator /actuator/prometheus 端点拉取指标
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # 外部标签（附加到所有时间序列）
  external_labels:
    application: deep-research-agent

# 告警规则文件
rule_files:
  - "/etc/prometheus/rules/*.yml"

# 抓取目标
scrape_configs:
  # Spring Boot 应用 — 直接抓取（始终可用，不依赖 OTel Collector）
  - job_name: 'deepresearch'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          env: 'production'
          service: 'deep-research-agent'

  # OTel Collector — 经由 OTLP 推送的指标（生产环境路径）
  - job_name: 'otel-collector'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          env: 'production'
          source: 'otel-collector'

  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
